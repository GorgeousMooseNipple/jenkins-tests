---

- name: "Test playbook"
  hosts:
    - localhost
  gather_facts: true
  vars:
    message: "Hello, world from ansible!"
  tasks:

    - name: "Print message"
      debug:
        var: message

    - name: "Print distribution name"
      debug:
        var: ansible_distribution

    - name: "Custom playbook action"
      debug:
        msg: "Doing some custom action"
